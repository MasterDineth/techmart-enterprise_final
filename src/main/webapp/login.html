<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>TechMart Enterprise - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid #334155;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 1.8rem;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
        }
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.4rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .alert {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .alert.show {
            display: block;
        }
        .alert-success {
            background: #14532d;
            color: #86efac;
            border: 1px solid #166534;
        }
        .alert-error {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #991b1b;
        }
        .alert-info {
            background: #1e3a5f;
            color: #93c5fd;
            border: 1px solid #1e40af;
        }
        .link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
        .link a {
            color: #3b82f6;
            text-decoration: none;
            cursor: pointer;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .loading {
            display: none;
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .concurrent-info {
            background: #1e3a5f;
            border: 1px solid #1e40af;
            border-radius: 6px;
            padding: 0.75rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #93c5fd;
            display: none;
        }
        .concurrent-info.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>⚡ TechMart</h1>
            <p>Enterprise Dashboard</p>
        </div>

        <div id="alert" class="alert"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Tab -->
        <div id="login" class="tab-content active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter username" required/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required/>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span id="login-btn-text">Sign In</span>
                    <div id="login-loading" class="loading"><span class="spinner"></span>Signing in...</div>
                </button>
            </form>
            <div id="login-concurrent" class="concurrent-info"></div>
        </div>

        <!-- Register Tab -->
        <div id="register" class="tab-content">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="register-username" placeholder="Choose username" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="register-email" placeholder="Enter email address" required/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="register-password" placeholder="Min 6 characters" minlength="6" required/>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="register-confirm" placeholder="Confirm password" required/>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span id="register-btn-text">Create Account</span>
                    <div id="register-loading" class="loading"><span class="spinner"></span>Registering...</div>
                </button>
            </form>
        </div>
    </div>

    <!-- Load Test Info -->
    <div style="text-align: center; margin-top: 2rem; color: #64748b; font-size: 0.8rem;">
        <p>💡 For concurrent load testing:</p>
        <p style="margin-top: 0.5rem;">
            Use <strong>JMeter</strong> with thread groups for simultaneous login/register scenarios
        </p>
    </div>
</div>

<script>
    const API = '/techmart/api';
    let currentSessionToken = null;
    let currentUserId = null;

    function switchTab(tabName) {
        // Hide all tabs
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

        // Show selected tab
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');

        // Clear alerts
        hideAlert();
    }

    async function handleLogin(event) {
        event.preventDefault();
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        if (!username || !password) {
            showAlert('Username and password are required', 'error');
            return;
        }

        setLoginLoading(true);
        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                currentSessionToken = data.sessionToken;
                currentUserId = data.userId;
                showAlert(`Welcome back, ${data.username}! Concurrent sessions: ${data.concurrentSessions}`, 'success');
                document.getElementById('login-concurrent').innerHTML = 
                    `📊 Active sessions: <strong>${data.concurrentSessions}</strong>`;
                document.getElementById('login-concurrent').classList.add('show');

                setTimeout(() => {
                    window.location.href = '/techmart/dashboard.html?token=' + currentSessionToken;
                }, 2000);
            } else {
                showAlert(data.message || 'Login failed', 'error');
            }
        } catch (e) {
            showAlert('Network error: ' + e.message, 'error');
        } finally {
            setLoginLoading(false);
        }
    }

    async function handleRegister(event) {
        event.preventDefault();
        const username = document.getElementById('register-username').value.trim();
        const email = document.getElementById('register-email').value.trim();
        const password = document.getElementById('register-password').value;
        const confirm = document.getElementById('register-confirm').value;

        if (!username || !email || !password || !confirm) {
            showAlert('All fields are required', 'error');
            return;
        }

        if (password !== confirm) {
            showAlert('Passwords do not match', 'error');
            return;
        }

        if (password.length < 6) {
            showAlert('Password must be at least 6 characters', 'error');
            return;
        }

        setRegisterLoading(true);
        try {
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if (res.status === 201) {
                showAlert('Account created! Please login.', 'success');
                setTimeout(() => {
                    document.getElementById('register-username').value = '';
                    document.getElementById('register-email').value = '';
                    document.getElementById('register-password').value = '';
                    document.getElementById('register-confirm').value = '';
                    switchTab('login');
                }, 1500);
            } else {
                showAlert(data.message || 'Registration failed', 'error');
            }
        } catch (e) {
            showAlert('Network error: ' + e.message, 'error');
        } finally {
            setRegisterLoading(false);
        }
    }

    function setLoginLoading(loading) {
        document.getElementById('login-btn-text').style.display = loading ? 'none' : 'inline';
        document.getElementById('login-loading').style.display = loading ? 'inline' : 'none';
    }

    function setRegisterLoading(loading) {
        document.getElementById('register-btn-text').style.display = loading ? 'none' : 'inline';
        document.getElementById('register-loading').style.display = loading ? 'inline' : 'none';
    }

    function showAlert(message, type) {
        const alertEl = document.getElementById('alert');
        alertEl.textContent = message;
        alertEl.className = `alert show alert-${type}`;
    }

    function hideAlert() {
        const alertEl = document.getElementById('alert');
        alertEl.className = 'alert';
    }

    // Check if already logged in
    window.addEventListener('load', () => {
        const token = new URLSearchParams(window.location.search).get('token');
        if (token) {
            window.location.href = '/techmart/dashboard.html?token=' + token;
        }
    });
</script>
</body>
</html>
